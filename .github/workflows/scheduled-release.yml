name: Scheduled Release

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Restore HTTP cache
        uses: actions/cache@v4
        with:
          path: out/http_cache.sqlite3
          key: http-cache

      - name: Fetch problem data
        run: nix develop --command python -m project_euler_offline fetch

      - name: Build compact PDF
        run: nix develop --command python -m project_euler_offline render --pdf

      - name: Build spaced PDF
        run: nix develop --command python -m project_euler_offline render --pdf --spaced

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          cp out/project_euler_offline.pdf project_euler_offline.pdf
          cp out/project_euler_offline_spaced.pdf project_euler_offline_spaced.pdf
          gh release create "${DATE}" \
            project_euler_offline.pdf \
            project_euler_offline_spaced.pdf \
            --title "${DATE}" \
            --notes "Automated build of Project Euler Offline."
